<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Add Student</h2>

<form th:action="@{/students/save}"
      th:object="${student}"
      method="post">

<input type="text"
       th:field="*{name}"
       placeholder="Name">

<br><br>

<input type="email"
       th:field="*{email}"
       placeholder="Email">

<br><br>

<select th:field="*{course}">
    <option th:each="course : ${courses}"
            th:value="${course.id}"
            th:text="${course.courseName}">
    </option>
</select>

<br><br>

<button type="submit">Save</button>

</form>

</body>
</html>
