<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        body {
          background-color: #5fa0e0;
          transition: background-color 2s ease;
          margin: 0;
          overflow: hidden;
          height: 100vh;
          position: relative;
        }
        @media screen and (max-width: 576px) {
            body { background-color: #e05f5f; }
        }
        @media screen and (max-width: 768px) and (min-width: 577px) {
            body { background-color: #5fe05f; }
        }

        /* --- CSS Bouncing Balls Setup --- */
        .ball-container {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0;
          pointer-events: none;
        }

        .ball {
          position: absolute;
          width: 30px;
          height: 30px;
          background-color: rgba(255, 255, 255, 0.6);
          border-radius: 50%;
        }

        @keyframes bounceX {
          from { left: 0px; }
          to { left: calc(100vw - 30px); }
        } 

        @keyframes bounceY {
          from { top: 0px; }
          to { top: calc(100vh - 30px); }
        }

        .med-screen-ball, .lg-screen-ball {
          display: none;
        }
        @media screen and (min-width: 577px) {
          .med-screen-ball { display: block; }
        }

        @media screen and (min-width: 992px) {
          .lg-screen-ball { display: block; }
        }
        .b1 { animation: bounceX 4s ease-in-out infinite alternate-reverse, bounceY 2.5s ease-in-out infinite alternate; }
        .b2 { animation: bounceX 5s ease-in-out infinite alternate, bounceY 3.2s ease-in-out infinite alternate; animation-delay: -1s; }
        
        .b3 { animation: bounceX 3.5s ease-in-out infinite alternate-reverse, bounceY 4.2s ease-in-out infinite alternate; }
        .b4 { animation: bounceX 6s ease-in-out infinite alternate, bounceY 2.8s ease-in-out infinite alternate; animation-delay: -0.5s; }
        
        .b5 { animation: bounceX 4.8s ease-in-out infinite alternate-reverse, bounceY 3.7s ease-in-out infinite alternate; }
        .b6 { animation: bounceX 5.5s ease-in-out infinite alternate, bounceY 4.5s ease-in-out infinite alternate; animation-delay: -2s; }

        .container {
          position: relative;
          z-index: 1;
        }
    </style>
  </head>
  <body>

    <div class="ball-container">
      <div class="ball b1"></div>
      <div class="ball b2"></div>

      <div class="ball med-screen-ball b3"></div>
      <div class="ball med-screen-ball b4"></div>

      <div class="ball lg-screen-ball b5"></div>
      <div class="ball lg-screen-ball b6"></div>
    </div>

    <div class="container mt-5">
      <h1 class="text-white">Hello world</h1>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
