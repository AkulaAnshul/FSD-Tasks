<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>User Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>User Registration</h1>
        </div>
    </header>
    <div class="nav-bar">
        <nav>
            <ul>
                <li class="sep-after"><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </div>
    <div class="container">
        <div class="welcome-box">
            <p class="welcome-text">Register for an Account</p>
        </div>
        <div class="grid-section">
            <div class="card">
                <h2>Registration Form</h2>
                <form>
                    <p>
                        <label for="name"><b>Full Name:</b></label><br>
                        <input type="text" id="name" name="name" required>
                    </p>

                    <p>
                        <label for="flat"><b>Flat / House Number:</b></label><br>
                        <input type="text" id="flat" name="flat" required>
                    </p>

                    <p>
                        <label for="email"><b>Email Address:</b></label><br>
                        <input type="email" id="email" name="email" required>
                    </p>

                    <p>
                        <label for="mobile"><b>Mobile Number:</b></label><br>
                        <input type="tel" id="mobile" name="mobile" required>
                    </p>

                    <p>
                        <label for="password"><b>Password:</b></label><br>
                        <input type="password" id="password" name="password" required>
                    </p>

                    <p>
                        <label for="confirm-password"><b>Confirm Password:</b></label><br>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </p>

                    <p>
                        <label><b>Resident Type:</b></label><br>
                        <input type="radio" id="owner" name="resident_type" value="owner" checked>
                        <label for="owner">Owner</label>
                        
                        <input type="radio" id="tenant" name="resident_type" value="tenant" style="margin-left: 20px;">
                        <label for="tenant">Tenant</label>
                    </p>

                    <div class="cta-container">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>

                </form>

            </div>
        </div>

    </div>

</body>
</html>
