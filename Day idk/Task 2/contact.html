<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://thumbs.dreamstime.com/b/state-college-logo-element-vector-illustration-decorative-design-191488103.jpg" alt="Logo" width="40" height="40" class="rounded-circle me-2">
                <span class="fw-bold">Random College</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div id="alertBox"></div>

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white p-3">
                        <h5 class="mb-0 fw-bold">Contact Us Form</h5>
                    </div>
                    <div class="card-body p-4">
                        <form onsubmit="event.preventDefault(); document.getElementById('alertBox').innerHTML = '<div class=\'alert alert-success alert-dismissible fade show\' role=\'alert\'>Message dispatched successfully!<button type=\'button\' class=\'btn-close\' data-bs-dismiss=\'alert\'></button></div>'; this.reset();">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Name</label>
                                <input type="text" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" placeholder="john@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Subject</label>
                                <input type="text" class="form-control" placeholder="Inquiry Subject" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Message</label>
                                <textarea class="form-control" rows="4" placeholder="Your message details..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2">Send Message</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="bg-dark text-white pt-2 pb-2 border-top mt-auto">
        <div class="container-fluid px-4">
            <div class="row align-items-center">
                <div class="col-12 col-md-6 text-center text-md-start mb-2 mb-md-0">
                    <p class="mb-0 text small">&copy; 2026 Random College Portal Ecosystem. All rights reserved.</p>
                </div>
                <div class="col-12 col-md-6 text-center text-md-end">
                    <a href="#" class="text-white-50 text-decoration-none me-3 small">Facebook</a>
                    <a href="#" class="text-white-50 text-decoration-none me-3 small">Twitter</a>
                    <a href="#" class="text-white-50 text-decoration-none me-3 small">Instagram</a>
                    <a href="#" class="text-white-50 text-decoration-none small">LinkedIn</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
